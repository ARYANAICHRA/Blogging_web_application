{% extends 'base.html' %}
{% block title %}Reset Password — BlogSphere{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><div class="brand">✦ BlogSphere</div></div>
    <h1 class="auth-title">Reset Password</h1>
    <p class="auth-sub">Enter the OTP sent to your email and choose a new password.</p>
    <form method="POST" class="otp-form">
      <input type="hidden" name="otp" id="otp-hidden">
      <div class="form-group">
        <label class="form-label">Enter OTP</label>
        <div class="otp-container">
          {% for i in range(6) %}
            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric">
          {% endfor %}
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" name="password" class="form-control" placeholder="Min 8 characters" required>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm New Password</label>
        <input type="password" name="confirm_password" class="form-control" placeholder="Repeat password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
    </form>
    <p class="auth-footer mt-2">
      Didn't receive OTP? <a href="{{ url_for('auth.resend_otp') }}" class="text-accent">Resend</a>
    </p>
  </div>
</div>
{% endblock %}
