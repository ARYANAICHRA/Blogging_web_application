{% extends 'base.html' %}
{% block title %}Forgot Password — BlogSphere{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><div class="brand">✦ BlogSphere</div></div>
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="width:64px;height:64px;border-radius:50%;background:var(--warning-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:1.5rem;color:var(--warning)">
        <i class="fas fa-lock-open"></i>
      </div>
      <h1 class="auth-title">Forgot password?</h1>
      <p class="auth-sub">Enter your email and we'll send you a reset OTP.</p>
    </div>
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Send OTP</button>
    </form>
    <p class="auth-footer mt-2"><a href="{{ url_for('auth.login') }}" class="text-accent"><i class="fas fa-arrow-left"></i> Back to Login</a></p>
  </div>
</div>
{% endblock %}
