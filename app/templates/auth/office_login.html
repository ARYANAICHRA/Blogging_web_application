{% extends 'base.html' %}
{% block title %}Office Access Login — BlogSphere{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><div class="brand">✦ Office Access</div></div>
    <h1 class="auth-title">Company Member Login</h1>
    <p class="auth-sub">This local host is restricted. Enter official office credentials to continue.</p>

    <form method="POST">
      <input type="hidden" name="next" value="{{ next_page }}">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Official username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Official password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Unlock Host Access</button>
    </form>

    <p class="auth-footer">Only authorized company members can access this host.</p>
  </div>
</div>
{% endblock %}
