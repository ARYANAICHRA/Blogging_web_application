{% extends 'base.html' %}
{% block title %}Edit Profile — BlogSphere{% endblock %}
{% block content %}
<div class="container-sm page-pad">
  <h1 class="mb-4">Edit Profile</h1>
  <div class="card">
    <div class="card-body">
      <form method="POST" enctype="multipart/form-data">
        <div style="text-align:center;margin-bottom:2rem">
          <img src="{{ url_for('static', filename='uploads/avatars/' + current_user.avatar) }}"
               class="avatar avatar-xl" id="avatar-preview" style="margin:0 auto 1rem" onerror="this.src='/static/img/default.png'">
          <div>
            <label for="avatar-input" class="btn btn-secondary btn-sm" style="cursor:pointer">
              <i class="fas fa-camera"></i> Change Photo
            </label>
            <input type="file" name="avatar" id="avatar-input" accept="image/*" style="display:none"
                   onchange="previewAvatar(this)">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" value="{{ current_user.username }}" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" value="{{ current_user.email }}" disabled>
          <p class="form-hint">Email cannot be changed.</p>
        </div>
        <div class="form-group">
          <label class="form-label">Bio / About</label>
          <textarea name="bio" class="form-control" rows="4" placeholder="Tell the world about yourself…">{{ current_user.bio or '' }}</textarea>
        </div>
        <div class="d-flex gap-1">
          <button type="submit" class="btn btn-primary">Save Changes</button>
          <a href="{{ url_for('user.dashboard') }}" class="btn btn-ghost">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
function previewAvatar(input) {
  const file = input.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = e => document.getElementById('avatar-preview').src = e.target.result;
    reader.readAsDataURL(file);
  }
}
</script>
{% endblock %}
