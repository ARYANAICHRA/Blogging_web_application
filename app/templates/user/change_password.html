{% extends 'base.html' %}
{% block title %}Change Password — BlogSphere{% endblock %}
{% block content %}
<div class="container-sm page-pad">
  <h1 class="mb-4">Change Password</h1>
  <div class="card">
    <div class="card-body">
      <form method="POST">
        <div class="form-group">
          <label class="form-label">Current Password</label>
          <input type="password" name="current_password" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input type="password" name="new_password" class="form-control" placeholder="Min 8 characters" required>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm New Password</label>
          <input type="password" name="confirm_password" class="form-control" required>
        </div>
        <div class="d-flex gap-1">
          <button type="submit" class="btn btn-primary">Update Password</button>
          <a href="{{ url_for('user.dashboard') }}" class="btn btn-ghost">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
